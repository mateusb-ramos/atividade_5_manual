<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Formulário</h1>
        
        <form id="form-inspecao">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email">

            <label for="setor">Setor</label>
            <select name="setor" id="setor">
                <option value="">Selecione...</option>
                <option value="operacao">Operação</option>
                <option value="manutencao">Manutenção</option>
                <option value="seguranca">Segurança</option>   
            </select>

            <p>Prioridade</p>
            <label for=""><input type="radio" name="prioridade" value="baixa">Baixa</label>
            <label for=""><input type="radio" name="prioridade" value="media">Média</label>
            <label for=""><input type="radio" name="prioridade" value="alta">Alta</label>

            <label for="descricao">Descrição</label>
            <textarea name="descricao" id="descricao"></textarea>

            <label for="">
                <input type="checkbox" id="termos" name="termos">
                Confirmo que revisei os dados
            </label>

            <button type="submit">Enviar</button>

            <p id="mensagem"></p>
        </form>
    </main>

    <script> //Começo do JS dentro do html
        const form = document.getElementById
        ('form-inspecao');
        const mensagem = document.getElementById
        ('mensagem');

        form.addEventListener('submit', function (event){
            event.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();;
            const setor = document.getElementById('setor').value;
            const descricao = document.getElementById('descricao').value;
            const termos = document.getElementById('termos').checked;
            const prioridade = document.querySelector('input[name = "prioridade"]:checked');

            if (nome === '') {
                mensagem.textContent = 'Preencha o nome.';
                return;
            }
            
            if (email === '') {
                mensagem.textContent = 'Preencha o email.';
                return;
            }         
            
            if (setor === '') {
                mensagem.textContent = 'Preencha o setor.';
                return;
            }         
            
            if (!prioridade) {
                mensagem.textContent = 'Preencha a prioridade.';
                return;
            } 
            
            if (descricao.length < 10) {
                mensagem.textContent = 'A descrição deve ter pelo menos 10 caracteres.'
                return;
            }

            if (!termos) {
                mensagem.textContent = 'Marque a confirmação de dados.'
                return;
            }

            mensagem.textContent = 'Formulário valido com sucesso.'
                                
        }); //Termino do JS
    </script> 

    <!--Já o JS separado basta escrever <script src="script.js"></script> no html para puxar o código JS-->
</body>
</html>
